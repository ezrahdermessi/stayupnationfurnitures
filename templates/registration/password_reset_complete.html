{% extends 'base.html' %}

{% block title %}Password Changed - Stayup Nation Furniture{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-12 col-md-6 col-lg-5">
            <div class="card shadow-lg border-0 rounded-3">
                <div class="card-body p-4 text-center">
                    <div class="mb-4">
                        <i class="fas fa-check-circle fa-3x text-success mb-3"></i>
                        <h2 class="mb-3">Password Changed!</h2>
                        <p class="text-muted">Your password has been successfully reset. You can now login with your new password.</p>
                    </div>
                    
                    <a href="{% url 'users:login' %}" class="btn btn-primary btn-lg">
                        <i class="fas fa-sign-in-alt me-2"></i>Login
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
